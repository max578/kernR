  - kernR-hierarchical

- title: Sensitivity and identifiability
  contents:
  - kernR-identifiability
  - kernR-sensitivity

- title: Acceleration and scaling
  contents:
  - kernR-nystrom

- title: Downscaling
  contents:
  - kernR-downscaling

- title: Cross-package integration with PESTO and proxymix
  contents:
